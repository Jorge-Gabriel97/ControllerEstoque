<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Cadastro de Cliente</title>
</head>
<body>
<div>
    <h1>Formulário de Cliente</h1>
    <hr>
    <div>
        <form th:action="@{/clientes/salvar}" method="POST" th:object="${cliente}">

            <input type="hidden" th:field="*{id}"/>

            <div>
                <label for="nome">Nome</label>
                <input type="text" th:field="*{nome}" maxlength="50" required/>
            </div>

            <div>
                <label for="cpf">CPF</label>
                <input type="text" th:field="*{cpf}" maxlength="11"/>
            </div>

            <div>
                <label for="dataDeNascimento">Data de Nascimento</label>
                <input type="date" th:field="*{dataDeNascimento}"/>
            </div>

            <div>
                <label for="sexo">Sexo</label>
                <select th:field="*{sexo}">
                    <option value="">Selecione...</option>
                    <option value="MASCULINO">Masculino</option>
                    <option value="FEMININO">Feminino</option>
                    <option value="OUTRO">Outro</option>
                </select>
            </div>

            <div>
                <label for="telefone">Telefone</label>
                <input type="tel" th:field="*{telefone}" maxlength="10"/>
            </div>

            <div>
                <label for="celular">Celular</label>
                <input type="tel" th:field="*{celular}" maxlength="11"/>
            </div>

            <div>
                <label for="email">E-mail</label>
                <input type="email" th:field="*{email}" maxlength="50"/>
            </div>

            <div>
                <label for="ativo">Ativo</label>
                <input type="checkbox" th:field="*{ativo}"/>
            </div>

            <br>
            <div>
                <input type="submit" value="Salvar"/>
            </div>

        </form>
    </div>
</div>
</body>
</html>
