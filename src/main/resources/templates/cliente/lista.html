<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Gerenciamento de Clientes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body class="bg-light"> <div class="container mt-5 mb-5">

    <div class="card shadow-lg border-0 rounded-4">

        <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center py-3 rounded-top-4">
            <h2 class="mb-0 fs-4">Lista de Clientes</h2>
            <form th:action="@{/clientes/novo}" method="GET" class="m-0">
                <button type="submit" class="btn btn-light text-primary fw-bold shadow-sm">+ Novo Cliente</button>
            </form>
        </div>
        <div th:if="${feedback != null}">
            <div class="alert alert-success alert-dismissible fade show shadow-sm" role="alert">
                <span th:text="${feedback}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Fechar"></button>
            </div>
        </div>


        <div class="card-body p-4">
            <div class="table-responsive">
                <table class="table table-striped table-hover align-middle border">
                    <thead class="table-light">
                    <tr>
                        <th>Nome</th>
                        <th>CPF</th>
                        <th>Data de Nascimento</th>
                        <th>Status</th> <th class="text-center">Ações</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="cliente : ${clientes}">
                        <td class="fw-bold text-secondary" th:text="${cliente.nome}">João da Silva</td>
                        <td th:text="${cliente.cpf}">000.000.000-00</td>
                        <td th:text="${#temporals.format(cliente.dataDeNascimento, 'dd/MM/yyyy')} ?: ${cliente.dataDeNascimento}">01/01/2000</td>

                        <td>
                            <span class="badge bg-success rounded-pill" th:if="${cliente.ativo}">Ativo</span>
                            <span class="badge bg-secondary rounded-pill" th:unless="${cliente.ativo}">Inativo</span>
                        </td>

                        <td class="text-center">
                            <a th:href="@{/clientes/editar/{id}(id=${cliente.id})}" class="btn btn-sm btn-outline-primary">Editar</a>

                            <a th:if="${cliente.ativo}" th:href="@{/clientes/inativa/{id}(id=${cliente.id})}" class="btn btn-sm btn-outline-danger ms-1">Inativar</a>
                            <a th:unless="${cliente.ativo}" th:href="@{/clientes/ativar/{id}(id=${cliente.id})}" class="btn btn-sm btn-outline-success ms-1">Ativar</a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <div th:if="${#lists.isEmpty(clientes)}" class="alert alert-info text-center mt-4 mb-0" role="alert">
                <h5 class="alert-heading mb-1">Nenhum cliente por aqui!</h5>
                <p class="mb-0">Ainda não há clientes cadastrados no sistema. Clique em <strong>+ Novo Cliente</strong> para começar.</p>
            </div>

        </div>
    </div>

</div>

</body>
</html>
