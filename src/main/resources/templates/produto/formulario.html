<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Cadastro de Produto - Estoque</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body class="bg-light">

<div th:replace="~{fragments/navbar :: menu_principal}"></div>

<div class="container mt-5 mb-5">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">

            <div class="card shadow-lg border-0 rounded-4">

                <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center py-3 rounded-top-4">
                    <h2 class="mb-0 fs-4">Formulário de Produto</h2>
                    <a th:href="@{/produtos}" class="btn btn-light text-primary fw-bold shadow-sm px-3">
                        &larr; Voltar
                    </a>
                </div>

                <div class="card-body p-4 p-md-5">
                    <form th:action="@{/produtos/salvar}" method="POST" th:object="${produto}" novalidate>

                        <input type="hidden" th:field="*{id}"/>

                        <div class="mb-4">
                            <label for="nome" class="form-label fw-bold">Nome do Produto</label>
                            <input type="text" class="form-control" th:field="*{nome}" maxlength="100" placeholder="Ex: Smartphone XYZ"/>
                            <span class="text-danger small fw-bold" th:if="${#fields.hasErrors('nome')}" th:errors="*{nome}"></span>
                        </div>

                        <div class="mb-4">
                            <label for="categoria" class="form-label fw-bold">Categoria</label>
                            <select class="form-select" th:field="*{categoria}">
                                <option value="">Selecione a categoria...</option>
                                <option th:each="cat : ${categorias}"
                                        th:value="${cat}"
                                        th:text="${cat.descricao}"></option>
                            </select>
                            <span class="text-danger small fw-bold" th:if="${#fields.hasErrors('categoria')}" th:errors="*{categoria}"></span>
                        </div>

                        <div class="form-check form-switch mb-5">
                            <input class="form-check-input fs-5" type="checkbox" role="switch" id="ativo" th:field="*{ativo}">
                            <label class="form-check-label fw-bold ms-2 mt-1" for="ativo">Produto Ativo para Movimentação</label>
                        </div>

                        <hr class="text-muted">

                        <div class="d-grid gap-2 d-md-flex justify-content-md-end mt-4">
                            <a th:href="@{/produtos}" class="btn btn-outline-secondary px-4">Cancelar</a>
                            <button type="submit" class="btn btn-primary px-5 shadow-sm">Salvar Produto</button>
                        </div>

                    </form>
                </div>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
