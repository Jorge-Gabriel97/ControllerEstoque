<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Gerenciamento de Produtos - Estoque</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body class="bg-light">

<div th:replace="~{fragments/navbar :: menu_principal}"></div>

<div class="container mt-5 mb-5">
    <div class="card shadow-lg border-0 rounded-4">

        <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center py-3 rounded-top-4">
            <h2 class="mb-0 fs-4">Catálogo de Produtos</h2>
            <form th:action="@{/produtos/novo}" method="GET" class="m-0">
                <button type="submit" class="btn btn-light text-primary fw-bold shadow-sm">+ Novo Produto</button>
            </form>
        </div>

        <div th:if="${feedback != null}">
            <div class="alert alert-success alert-dismissible fade show shadow-sm m-3 mb-0" role="alert">
                <span th:text="${feedback}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Fechar"></button>
            </div>
        </div>

        <div class="card-body p-4">
            <div class="table-responsive">
                <table class="table table-striped table-hover align-middle border">
                    <thead class="table-light">
                    <tr>
                        <th>Nome do Produto</th>
                        <th>Categoria</th>
                        <th>Status</th>
                        <th class="text-center">Ações</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="produto : ${produtos}">
                        <td class="fw-bold text-secondary" th:text="${produto.nome}">Nome Produto</td>
                        <td th:text="${produto.categoria.descricao}">Categoria</td>
                        <td>
                            <span class="badge bg-success rounded-pill" th:if="${produto.ativo}">Ativo</span>
                            <span class="badge bg-secondary rounded-pill" th:unless="${produto.ativo}">Inativo</span>
                        </td>
                        <td class="text-center">
                            <a th:href="@{/produtos/editar/{id}(id=${produto.id})}" class="btn btn-sm btn-outline-primary">Editar</a>
                            <a th:if="${produto.ativo}" th:href="@{/produtos/inativa/{id}(id=${produto.id})}" class="btn btn-sm btn-outline-danger ms-1">Inativar</a>
                            <a th:unless="${produto.ativo}" th:href="@{/produtos/ativar/{id}(id=${produto.id})}" class="btn btn-sm btn-outline-success ms-1">Ativar</a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <div th:if="${#lists.isEmpty(produtos)}" class="alert alert-info text-center mt-4 mb-0" role="alert">
                <h5 class="alert-heading mb-1">Nenhum produto cadastrado!</h5>
                <p class="mb-0">Clique em <strong>+ Novo Produto</strong> para começar a popular o seu catálogo.</p>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
