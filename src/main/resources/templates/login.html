<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Controller Estoque</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body class="bg-light d-flex align-items-center" style="height: 100vh;">

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5 col-lg-4">

            <div class="card shadow-lg border-0 rounded-4 p-4">
                <div class="card-body">
                    <div class="text-center mb-4">
                        <h1 class="display-6 fw-bold text-primary"><i class="bi bi-box-seam"></i></h1>
                        <h4 class="fw-bold text-secondary">Controle de Estoque</h4>
                        <p class="text-muted small">Faça login para acessar o sistema</p>
                    </div>

                    <div th:if="${param.error}" class="alert alert-danger p-2 text-center small rounded-3">
                        <i class="bi bi-exclamation-circle"></i> Usuário ou senha inválidos.
                    </div>
                    <div th:if="${param.logout}" class="alert alert-success p-2 text-center small rounded-3">
                        <i class="bi bi-check-circle"></i> Você saiu do sistema.
                    </div>

                    <form th:action="@{/login}" method="post">
                        <div class="mb-3">
                            <label for="username" class="form-label fw-bold text-secondary">Usuário</label>
                            <input type="text" class="form-control bg-light" id="username" name="username" placeholder="Digite seu usuário" required autofocus>
                        </div>
                        <div class="mb-4">
                            <label for="password" class="form-label fw-bold text-secondary">Senha</label>
                            <input type="password" class="form-control bg-light" id="password" name="password" placeholder="Digite sua senha" required>
                        </div>
                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary fw-bold rounded-pill shadow-sm">
                                Entrar <i class="bi bi-box-arrow-in-right ms-1"></i>
                            </button>
                        </div>
                    </form>

                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
