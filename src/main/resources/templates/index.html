<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controller Estoque - Início</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body class="bg-light">

<div th:replace="~{fragments/navbar :: menu_principal}"></div>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8 text-center">
            <div class="bg-white p-5 rounded-4 shadow-sm border">
                <h1 class="fw-bold text-primary">📦 Sistema de Estoque</h1>
                <p class="text-muted">Bem-vindo, usuário! Utilize o menu superior para navegar.</p>
                <hr>
                <div class="d-grid gap-2 d-md-flex justify-content-md-center mt-4">
                    <a th:href="@{/clientes}" class="btn btn-outline-primary px-4 fw-bold shadow-sm">Ver Clientes</a>

                    <form th:action="@{/logout}" method="post" class="m-0">
                        <button type="submit" class="btn btn-danger px-4 fw-bold shadow-sm">
                            Sair do Sistema <i class="bi bi-box-arrow-right ms-1"></i>
                        </button>
                    </form>

                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
