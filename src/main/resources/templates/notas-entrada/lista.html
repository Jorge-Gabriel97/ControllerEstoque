<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Histórico de Notas de Entrada - Estoque</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body class="bg-light">

<div th:replace="~{fragments/navbar :: menu_principal}"></div>

<div class="container mt-5 mb-5">
    <div class="card shadow-lg border-0 rounded-4">

        <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center py-3 rounded-top-4">
            <h2 class="mb-0 fs-4"><i class="bi bi-receipt me-2"></i>Notas de Entrada</h2>
            <a th:href="@{/notas-entrada/novo}" class="btn btn-light text-primary fw-bold shadow-sm">
                <i class="bi bi-plus-lg me-1"></i> Nova Nota
            </a>
        </div>

        <div class="card-body p-4">
            <div class="table-responsive">
                <table class="table table-striped table-hover align-middle border">
                    <thead class="table-light">
                    <tr>
                        <th class="text-center">Nº da Nota</th>
                        <th>Data/Hora</th>
                        <th>Fornecedor</th>
                        <th class="text-end">Valor Total</th>
                        <th class="text-center">Status</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="nota : ${notas}">
                        <td class="text-center fw-bold text-secondary" th:text="${nota.id}">000</td>

                        <td th:text="${#temporals.format(nota.dataHora, 'dd/MM/yyyy HH:mm')}">01/01/2026 12:00</td>

                        <td th:text="${nota.fornecedor.razaoSocial}">Nome do Fornecedor</td>

                        <td class="text-end text-success fw-bold">
                            R$ <span th:text="${#numbers.formatDecimal(nota.total, 1, 'POINT', 2, 'COMMA')}">0,00</span>
                        </td>

                        <td class="text-center">
                            <span class="badge bg-success rounded-pill">Processada</span>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <div th:if="${#lists.isEmpty(notas)}" class="alert alert-info text-center mt-4 mb-0 shadow-sm" role="alert">
                <h5 class="alert-heading mb-1">Nenhuma nota registrada!</h5>
                <p class="mb-0">Clique em <strong>+ Nova Nota</strong> para registrar sua primeira entrada de produtos.</p>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
